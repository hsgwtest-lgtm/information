<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SO101 Sim">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>SO101 Virtual PWA</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- 3D Viewer (60%) -->
    <div id="viewer-container"></div>

    <!-- Control Panel (40%) -->
    <div id="control-panel">
      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-fk">FK</button>
        <button class="tab-btn" id="tab-ik">IK</button>
        <button class="tab-btn" id="tab-seq">SEQ</button>
      </div>

      <!-- FK Panel -->
      <div id="panel-fk" class="panel" style="display:block;"></div>

      <!-- IK Panel -->
      <div id="panel-ik" class="panel"></div>

      <!-- Sequencer Panel -->
      <div id="panel-seq" class="panel"></div>
    </div>
  </div>

  <!-- iOS Install Hint -->
  <div id="install-hint">
    📱 ホーム画面に追加するとフルスクリーンで使えます<br>
    <small>共有 → ホーム画面に追加</small>
  </div>

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
          integrity="sha384-bMFMgCdOHkSbZprfSFM4fTcOaRFBBh3R9SkMEhJrmbO2pSeamOPWSP3ixjmSOD1P"
          crossorigin="anonymous"></script>
  <!-- OrbitControls for r128 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"
          integrity="sha384-zzVF93ShOBMaNak3h+mQMnKaJbOZNZniSk0gRk0zLaeaRqbGEhx9VPoD1A4hLpKB"
          crossorigin="anonymous"></script>

  <!-- App -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
