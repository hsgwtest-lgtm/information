<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03000f"/>
      <stop offset="100%" stop-color="#150030"/>
    </linearGradient>
    <linearGradient id="dawn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="50%" stop-color="#ff8833"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2ff"/>
      <stop offset="28%" stop-color="#9a9aaa"/>
      <stop offset="65%" stop-color="#6a5540"/>
      <stop offset="100%" stop-color="#2a5a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#sky)" rx="88"/>
  <ellipse cx="256" cy="285" rx="110" ry="55" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Route glow line -->
  <polyline points="256,155 280,230 295,280" stroke="#ffcc44" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Sun -->
  <circle cx="256" cy="270" r="26" fill="url(#dawn)" opacity="0.95"/>
  <!-- Mountain -->
  <path d="M40 430 L175 205 L218 258 L256 172 L294 258 L337 205 L472 430 Z" fill="url(#mtn)"/>
  <!-- Snow cap -->
  <path d="M218 258 L256 172 L294 258 L278 248 L256 210 L234 248 Z" fill="#f0f0ff" opacity="0.96"/>
  <!-- Route dot at summit -->
  <circle cx="256" cy="178" r="6" fill="#ffd700" opacity="0.9"/>
  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="75"  cy="75"  r="2.2" opacity="0.8"/>
    <circle cx="135" cy="45"  r="1.6" opacity="0.7"/>
    <circle cx="390" cy="55"  r="2.0" opacity="0.8"/>
    <circle cx="440" cy="95"  r="1.6" opacity="0.6"/>
    <circle cx="315" cy="38"  r="1.2" opacity="0.6"/>
    <circle cx="92"  cy="155" r="1.2" opacity="0.5"/>
    <circle cx="455" cy="148" r="1.6" opacity="0.7"/>
    <circle cx="190" cy="32"  r="1.0" opacity="0.5"/>
  </g>
  <!-- Moon -->
  <circle cx="420" cy="85" r="18" fill="#e8e8d8" opacity="0.82"/>
</svg>
