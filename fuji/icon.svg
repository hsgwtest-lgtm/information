<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050010"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0ff"/>
      <stop offset="30%" stop-color="#a0a0b0"/>
      <stop offset="70%" stop-color="#6b5744"/>
      <stop offset="100%" stop-color="#2d5a1b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#sky)" rx="80"/>
  <!-- Sun glow -->
  <ellipse cx="256" cy="260" rx="90" ry="50" fill="url(#glow)"/>
  <!-- Sun rays -->
  <g stroke="#ffd700" stroke-width="2" opacity="0.5">
    <line x1="256" y1="200" x2="256" y2="170"/>
    <line x1="296" y1="210" x2="316" y2="186"/>
    <line x1="216" y1="210" x2="196" y2="186"/>
    <line x1="310" y1="240" x2="340" y2="228"/>
    <line x1="202" y1="240" x2="172" y2="228"/>
  </g>
  <!-- Sun -->
  <circle cx="256" cy="255" r="28" fill="url(#sun)" opacity="0.9"/>
  <!-- Mountain silhouette -->
  <path d="M50 420 L180 210 L220 260 L256 185 L292 260 L332 210 L462 420 Z" fill="url(#mountain)"/>
  <!-- Snow cap -->
  <path d="M220 260 L256 185 L292 260 L275 252 L256 218 L237 252 Z" fill="#f0f0ff" opacity="0.95"/>
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="80" cy="80" r="2"/>
    <circle cx="140" cy="50" r="1.5"/>
    <circle cx="380" cy="60" r="2"/>
    <circle cx="430" cy="100" r="1.5"/>
    <circle cx="320" cy="40" r="1"/>
    <circle cx="100" cy="150" r="1"/>
    <circle cx="460" cy="150" r="1.5"/>
  </g>
</svg>
