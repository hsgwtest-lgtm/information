// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function detectSeason(date) {
  const d = new Date(date);
  const m = d.getMonth() + 1; // 1-12
  const day = d.getDate();

  // H (High / ハイシーズン)
  // 冬休み: 12/20-1/8、GW: 4/25-5/6、夏: 7/22-8/31
  if (m === 12 && day >= 20) return 'H';
  if (m === 1 && day <= 8) return 'H';
  if (m === 4 && day >= 25) return 'H';
  if (m === 5 && day <= 6) return 'H';
  if (m === 7 && day >= 22) return 'H';
  if (m === 8) return 'H';

  // L (Low / ローシーズン)
  // 1/9-3/19、6/1-6/30、9/1-9/30、10/1-11/14
  if (m === 1 && day >= 9) return 'L';
  if (m === 2) return 'L';
  if (m === 3 && day <= 19) return 'L';
  if (m === 6) return 'L';
  if (m === 9) return 'L';
  if (m === 10 && day <= 14) return 'L';

  // R (Regular / レギュラーシーズン) = rest
  return 'R';
}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>

          {value.toLocaleString()}
        </div>

      <input
        type="range"
        min={1000}
        max={max}
        step={1000}
        value={value}
        onChange={handleChange}
        style={{ '--pct': pct + '%' }}
      />

      </div>
      {/* Quick picks */}
      <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
        {SLIDER_STEPS[selectedClass].map(step => (
          <button
            key={step}
            onClick={() => onChange(step)}
            style={{
              background: value === step ? 'rgba(30,123,212,0.4)' : 'rgba(255,255,255,0.07)',
              border: value === step ? '1px solid #5BAEF0' : '1px solid rgba(255,255,255,0.1)',
              borderRadius: 6,
              padding: '3px 8px',
              color: value === step ? '#fff' : 'rgba(255,255,255,0.5)',
              fontSize: 10,
              fontWeight: 600,
              cursor: 'pointer',
            }}
          >
            {(step / 1000).toFixed(0)}k
          </button>
        ))}
      </div>
    </div>
  );
}

function ZoneCard({ zone, seatClass, season, idx }) {
  const miles = zone.miles[seatClass][season];
  const s = SEASON_INFO[season];
  const cls = CLASSES.find(c => c.id === seatClass);
  const [expanded, setExpanded] = React.useState(false);

  return (
    <div
      className="card-enter glass-card"
      style={{
        borderRadius: 16,
        overflow: 'hidden',
        animationDelay: `${idx * 0.04}s`,
        boxShadow: '0 4px 20px rgba(0,0,0,0.12)',
      }}
    >
      {/* Card header */}
      <div style={{
        background: zone.color,
        padding: '10px 14px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 18 }}>{zone.emoji}</span>
          <div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.7)', fontWeight: 600, letterSpacing: '0.08em' }}>
              {zone.name}
            </div>
            <div style={{ fontSize: 13, color: '#fff', fontWeight: 700 }}>
              {zone.regionLabel}
            </div>
          </div>
        </div>
        <div style={{
          background: 'rgba(0,0,0,0.2)',
          borderRadius: 8,
          padding: '3px 8px',
          fontSize: 10,
          color: 'rgba(255,255,255,0.8)',
          fontWeight: 600,
        }}>
          {cls.short}
        </div>
      </div>

      {/* Miles display */}
      <div style={{ padding: '14px 16px 0' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginBottom: 8 }}>
          <span style={{
            fontSize: 30,
            fontWeight: 800,
            color: '#001F5B',
            letterSpacing: '-0.03em',
            lineHeight: 1,
          }}>
            {miles.toLocaleString()}
          </span>
          <span style={{ fontSize: 13, color: '#6B7280', fontWeight: 500 }}>マイル</span>
        </div>

        {/* All seasons comparison */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 6,
          marginBottom: 12,
        }}>
          {['L', 'R', 'H'].map(s2 => {
            const m = zone.miles[seatClass][s2];
            const si = SEASON_INFO[s2];
            const isCurrent = s2 === season;
            return (
              <div key={s2} style={{
                background: isCurrent ? si.color + '15' : '#F9FAFB',
                border: isCurrent ? `1.5px solid ${si.color}40` : '1px solid #E5E7EB',
                borderRadius: 8,
                padding: '6px 8px',
                textAlign: 'center',
              }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: si.color, letterSpacing: '0.08em', marginBottom: 2 }}>
                  {si.short} {isCurrent && '◀'}
                </div>
                <div style={{ fontSize: 12, fontWeight: 700, color: '#1F2937' }}>
                  {(m / 1000).toFixed(0)}k
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Destinations */}
      <button
        onClick={() => setExpanded(!expanded)}
        style={{
          width: '100%',
          background: 'none',
          border: 'none',
          borderTop: '1px solid #F3F4F6',
          padding: '8px 16px 12px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          cursor: 'pointer',
          color: '#6B7280',
          fontSize: 11,
          fontWeight: 500,
        }}
      >
        <span>{zone.destinations.length}都市 対応</span>
        <span style={{ transform: expanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s', display: 'inline-block' }}>▾</span>
      </button>

      {expanded && (
        <div style={{
          padding: '0 16px 14px',
          borderTop: '1px solid #F3F4F6',
        }}>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
            {zone.destinations.map(dest => (
              <span key={dest} style={{
                background: zone.color + '12',
                border: `1px solid ${zone.color}30`,
                borderRadius: 6,
                padding: '3px 8px',
                fontSize: 10,
                color: zone.color,
                fontWeight: 500,
              }}>
                {dest}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ResultsGrid({ results, seatClass, season }) {
  if (results.length === 0) {
    return (
      <div style={{ textAlign: 'center', padding: '48px 24px' }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>✈️</div>
        <div style={{ color: 'rgba(255,255,255,0.6)', fontSize: 14, fontWeight: 500 }}>
          条件に合う目的地が見つかりません
        </div>
        <div style={{ color: 'rgba(255,255,255,0.35)', fontSize: 12, marginTop: 6 }}>
          上限マイル数を増やすか、エリアを変更してください
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '4px 2px 12px',
      }}>
        <div style={{ color: 'rgba(255,255,255,0.6)', fontSize: 12 }}>
          <span style={{ color: '#fff', fontWeight: 700, fontSize: 16 }}>{results.length}</span> 件ヒット
        </div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>
          マイル数が少ない順
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {results.map((zone, idx) => (
          <ZoneCard key={zone.id} zone={zone} seatClass={seatClass} season={season} idx={idx} />
        ))}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MAIN APP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function App() {
  const [date, setDate] = React.useState(todayISO);
  const [seatClass, setSeatClass] = React.useState('economy');
  const [region, setRegion] = React.useState('all');
  const [maxMiles, setMaxMiles] = React.useState(45000);

  const season = detectSeason(date);

  // Sync maxMiles when class changes
  const handleClassChange = (cls) => {
    setSeatClass(cls);
    setMaxMiles(MAX_MILES[cls]);
  };

  // Filter & sort
  const results = React.useMemo(() => {
    return ZONES
      .filter(zone => {
        if (region !== 'all' && zone.region !== region) return false;
        const miles = zone.miles[seatClass][season];
        return miles <= maxMiles;
      })
      .sort((a, b) => a.miles[seatClass][season] - b.miles[seatClass][season]);
  }, [seatClass, region, maxMiles, season]);

  return (
    <div className="bg-mesh bg-dots" style={{ minHeight: '100dvh' }}>
      <Header />

      {/* Controls panel */}
      <div style={{ padding: '0 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <DateSeasonSelector date={date} onDateChange={setDate} />
        <ClassSelector selected={seatClass} onChange={handleClassChange} />
        <MilesSlider value={maxMiles} onChange={setMaxMiles} selectedClass={seatClass} />
        <RegionFilter selected={region} onChange={setRegion} />
      </div>

      {/* Divider */}
      <div style={{
        height: 1,
        background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent)',
        margin: '0 16px 16px',
      }} />

      {/* Results */}
      <div style={{ padding: '0 16px' }} className="safe-bottom">
        <ResultsGrid results={results} seatClass={seatClass} season={season} />
        <div style={{ height: 32 }} />
        <div style={{
          textAlign: 'center',
          fontSize: 10,
          color: 'rgba(255,255,255,0.2)',
          paddingBottom: 8,
        }}>
          データはサンプルです · ANA公式サイトで必ず最新情報をご確認ください
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

// iOS install hint (shows once)
window.addEventListener('load', () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('install-hint-dismissed');

  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      const hint = document.createElement('div');
      hint.innerHTML = `
        <div id="install-hint" style="
          position: fixed; bottom: 0; left: 0; right: 0;
          background: rgba(0,31,91,0.97);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border-top: 1px solid rgba(255,255,255,0.1);
          padding: 16px 20px 32px;
          z-index: 9999;
          display: flex; align-items: flex-start; gap: 12px;
          font-family: 'Noto Sans JP', sans-serif;
        ">
          <span style="font-size: 28px; margin-top: 2px;">✈️</span>
          <div style="flex: 1;">
            <div style="color: #fff; font-weight: 700; font-size: 14px; margin-bottom: 4px;">
              ホーム画面に追加できます
            </div>
            <div style="color: rgba(255,255,255,0.55); font-size: 12px; line-height: 1.5;">
              Safari下部の <strong style="color:#5BAEF0">共有 ⬆</strong> ボタン →「<strong style="color:#5BAEF0">ホーム画面に追加</strong>」でアプリとして使えます
            </div>
          </div>
          <button onclick="document.getElementById('install-hint').style.display='none'; localStorage.setItem('install-hint-dismissed','1')" style="
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 4px;
          ">×</button>
        </div>
      `;
      document.body.appendChild(hint);
    }, 3000);
  }
});
</script>
